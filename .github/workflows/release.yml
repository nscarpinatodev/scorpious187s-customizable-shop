name: Release

# Publishes a Foundry VTT module release whenever a version tag (vX.Y.Z) is pushed.
# It rewrites module.json so `version` and `download` point at this exact tag,
# bundles the module into module.zip, and attaches both to a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Patch module.json for this release
        run: |
          jq --arg version "$VERSION" \
             --arg url "https://github.com/${GITHUB_REPOSITORY}" \
             --arg manifest "https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/module.json" \
             --arg download "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/module.zip" \
             '.version = $version | .url = $url | .manifest = $manifest | .download = $download' \
             module.json > module.json.tmp
          mv module.json.tmp module.json
          echo "----- module.json -----"
          cat module.json

      - name: Build module.zip
        run: zip -r module.zip module.json scripts styles templates lang

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            module.json
            module.zip
          fail_on_unmatched_files: true
